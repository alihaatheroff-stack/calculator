# .github/workflows/ci-cd.yml
# This file controls the ENTIRE automation pipeline
# GitHub reads this file and runs it automatically on every push

name: Python Calculator CI/CD   # Name shown in GitHub Actions tab

# ─────────────────────────────────────────────────
# TRIGGERS: When should this pipeline run?
# ─────────────────────────────────────────────────
on:
  push:
    branches:
      - main        # Run when code is pushed to main branch
      - develop     # Run when code is pushed to develop branch
  pull_request:
    branches:
      - main        # Run when someone opens a Pull Request to main

# ─────────────────────────────────────────────────
# JOBS: What should the pipeline actually do?
# ─────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════
  # JOB 1: TEST
  # Runs on EVERY branch to check code quality
  # ══════════════════════════════════════════════
  test:
    name: Run Tests               # Label shown in GitHub UI
    runs-on: ubuntu-latest        # Use a fresh Linux virtual machine

    # Run tests on multiple Python versions at once!
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:

      # Step 1: Download your repo code onto the virtual machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install the Python version we need
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Step 3: Install pytest and other dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run ALL the tests in test_calculator.py
      - name: Run tests
        run: |
          pytest test_calculator.py -v
          # -v means "verbose" — shows each test result individually

      # Step 5: Check how much of our code is covered by tests
      - name: Check test coverage
        run: |
          pytest --cov=calculator --cov-report=term-missing
          # This shows which lines of code are NOT tested yet

  # ══════════════════════════════════════════════
  # JOB 2: LINT (Code Quality Check)
  # Checks that code follows Python style rules
  # ══════════════════════════════════════════════
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: test                   # Only run if tests pass first!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: |
          flake8 calculator.py --max-line-length=100
          # flake8 checks for code style issues
          # like unused imports, bad spacing, etc.

  # ══════════════════════════════════════════════
  # JOB 3: BUILD SUMMARY
  # Creates a simple "build report"
  # In real projects this would compile/package the app
  # ══════════════════════════════════════════════
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, lint]           # Only run if BOTH jobs above pass!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify calculator works
        run: |
          python -c "
          from calculator import add, subtract, multiply, divide
          print('✅ add(2,3) =', add(2, 3))
          print('✅ subtract(10,4) =', subtract(10, 4))
          print('✅ multiply(3,4) =', multiply(3, 4))
          print('✅ divide(15,3) =', divide(15, 3))
          print('🎉 All functions working perfectly!')
          "

      # Save the calculator file as an "artifact"
      # (downloadable file from GitHub Actions)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app
          path: calculator.py
          retention-days: 7       # Keep for 7 days

      - name: Pipeline Complete!
        run: |
          echo "════════════════════════════════════"
          echo "  ✅ Tests passed"
          echo "  ✅ Code quality checked"  
          echo "  ✅ Build successful"
          echo "  🚀 Ready to deploy!"
          echo "════════════════════════════════════"