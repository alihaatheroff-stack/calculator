name: Python Calculator CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature
  pull_request:
    branches:
      - main
      - develop

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/python-calculator

jobs:

  # ══════════════════════════════════════════════
  # JOB 1: TEST
  # Runs on ALL branches — feature, develop, main
  # Every single push gets tested, no exceptions
  # ══════════════════════════════════════════════
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest test_calculator.py -v

      - name: Check coverage
        run: pytest --cov=calculator --cov-report=term-missing

  # ══════════════════════════════════════════════
  # JOB 2: LINT
  # Runs on ALL branches
  # Checks code is clean and professional
  # ══════════════════════════════════════════════
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run linter
        run: |
          flake8 calculator.py --max-line-length=100
          # app.py will be linted after we create it

  # ══════════════════════════════════════════════
  # JOB 3: BUILD
  # Runs on ALL branches
  # Compiles and packages the app
  # ══════════════════════════════════════════════
  build:
    name: 🔨 Build Package
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile calculator.py
          echo "✅ calculator.py compiled successfully"

      - name: Build package
        run: |
          pip install build
          python -m build --wheel
          echo "✅ Package created!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-package
          path: dist/
          retention-days: 7

  # ══════════════════════════════════════════════
  # JOB 4: DOCKER STAGING
  # ONLY runs when code is on develop branch
  # Builds image with :staging tag
  # feature branch pushes NEVER reach this job
  # ══════════════════════════════════════════════
  docker-staging:
    name: 🐳 Docker Build Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:staging
            ${{ env.DOCKER_IMAGE }}:staging-${{ github.sha }}

      - name: Confirm image pushed
        run: |
          echo "✅ Staging image pushed to Docker Hub!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:staging"
          echo "📦 Commit image: ${{ env.DOCKER_IMAGE }}:staging-${{ github.sha }}"

  # ══════════════════════════════════════════════
  # JOB 5: DOCKER PRODUCTION
  # ONLY runs when code is on main branch
  # Builds image with :latest tag
  # develop and feature NEVER reach this job
  # ══════════════════════════════════════════════
  docker-production:
    name: 🐳 Docker Build Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Confirm image pushed
        run: |
          echo "✅ Production image pushed to Docker Hub!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo "📦 Commit image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

  # ══════════════════════════════════════════════
  # JOB 6: DEPLOY STAGING
  # ONLY runs when code is on develop branch
  # Tells Render staging server to pull new image
  # ══════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-staging
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Trigger Render staging deployment
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_HOOK }}"
          echo "✅ Staging deployment triggered!"

      - name: Print staging info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌍 STAGING DEPLOYMENT COMPLETE"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:staging"
          echo "🔗 URL: check your Render staging dashboard"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ══════════════════════════════════════════════
  # JOB 7: DEPLOY PRODUCTION
  # ONLY runs when code is on main branch
  # Tells Render production server to pull new image
  # ══════════════════════════════════════════════
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render production deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Production deployment triggered!"

      - name: Print production info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌍 PRODUCTION DEPLOYMENT COMPLETE"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo "🔗 URL: https://python-calculator-mma0.onrender.com"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"